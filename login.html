<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum OPS Elite - Sign In</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      background-color: #0b0f19;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .auth-card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(56, 189, 248, 0.2);
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.15);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(10px);
    }
    .auth-card h2 {
      margin-top: 0;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }
    .form-group input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }
    .btn-submit {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.6);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .auth-footer a {
      color: #38bdf8;
      text-decoration: none;
    }
    .status-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <h2>Quantum OPS</h2>
  <p style="text-align:center; color:#64748b; font-size:0.9rem; margin-bottom:1.5rem;">Command Center Login</p>
  
  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="name@company.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Authenticate</button>
  </form>

  <div id="statusMsg" class="status-msg"></div>

  <div class="auth-footer">
    Need a company workspace? <a href="signup.html">Register Here</a>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('statusMsg');
    
    btn.disabled = true;
    btn.innerText = "Authenticating...";
    msg.style.color = "#38bdf8";
    msg.innerText = "Verifying credentials...";

    const payload = {
      email: document.getElementById('email').value,
      passwordHash: document.getElementById('password').value
    };

    const res = await apiCall("LOGIN_USER", payload);

    if (res.success) {
      msg.style.color = "#22c55e";
      msg.innerText = "Access Granted! Loading Workspace...";
      
      // Save session info
      setSession({
        userId: res.data.userId,
        companyId: res.data.companyId,
        fullName: res.data.fullName,
        email: res.data.email,
        role: res.data.role
      });

      setTimeout(() => {
        window.location.href = "quantum-ops-elite-dashboard.html";
      }, 1200);
    } else {
      msg.style.color = "#ef4444";
      msg.innerText = res.message || "Invalid credentials.";
      btn.disabled = false;
      btn.innerText = "Authenticate";
    }
  });
</script>
</body>
</html>
