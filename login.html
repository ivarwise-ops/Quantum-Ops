<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum OPS Elite - Command Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #080d1a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .neon-glow:focus {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-2xl p-8 relative overflow-hidden">
        
        <!-- Header / Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-blue-600/20 border border-blue-500/40 text-blue-400 mb-3 neon-glow">
                <i class="fa-solid fa-crown text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white">QUANTUM OPS <span class="text-blue-500">ELITE</span></h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Enterprise Command Access</p>
        </div>

        <!-- Alert Message Container -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-lg text-sm font-medium transition-all"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
            
            <!-- Email Address -->
            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Work Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required placeholder="commander@enterprise.com" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <!-- Password -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-semibold text-gray-300 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs text-blue-400 hover:text-blue-300">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••••••" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" 
                class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-lg shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span>AUTHENTICATE</span>
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-6 text-center text-xs text-gray-400">
            Need an enterprise account? 
            <a href="signup.html" class="text-blue-400 hover:text-blue-300 font-semibold underline ml-1">Register Workspace</a>
        </div>
    </div>

    <!-- JavaScript Handler -->
    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzy5OVPf1zk4Quy_RvrictzgLVWFZ77E4VL1PnR7gcPexkffVCNoxsun0zceBMRBAxm/exec";

        async function handleLogin(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById("submitBtn");
            const alertBox = document.getElementById("alert-box");

            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> AUTHENTICATING...`;
            alertBox.classList.add("hidden");

            const payload = {
                action: "login",
                payload: {
                    email: document.getElementById("email").value.trim(),
                    password: document.getElementById("password").value,
                    device: navigator.userAgent
                }
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    showAlert("Authentication successful! Loading Command Center...", "success");
                    
                    // Save session token and user details to localStorage
                    localStorage.setItem("quantum_token", result.data.token);
                    localStorage.setItem("quantum_company_id", result.data.companyId);
                    localStorage.setItem("quantum_user", JSON.stringify(result.data));

                    // Redirect to Main Dashboard View
                    setTimeout(() => {
                        window.location.href = "quantum-ops-elite-dashboard.html";
                    }, 1500);
                } else {
                    showAlert(result.message || "Invalid credentials. Please try again.", "error");
                }

            } catch (err) {
                showAlert("Connection error to Google Apps Script. Please try again.", "error");
                console.error("Login error:", err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> <span>AUTHENTICATE</span>`;
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById("alert-box");
            alertBox.classList.remove("hidden", "bg-red-500/20", "border-red-500", "text-red-300", "bg-green-500/20", "border-green-500", "text-green-300");

            if (type === "success") {
                alertBox.classList.add("bg-green-500/20", "border", "border-green-500", "text-green-300");
            } else {
                alertBox.classList.add("bg-red-500/20", "border", "border-red-500", "text-red-300");
            }
            alertBox.innerText = message;
        }
    </script>
</body>
</html>
