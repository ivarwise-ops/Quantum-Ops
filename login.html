<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quantum Ops Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">Sign In</h1>
        </div>
        
        <form id="loginForm" class="bg-slate-900 border border-slate-700 rounded-3xl p-8 space-y-5">
            <input type="text" id="email" placeholder="Email or Username" required 
                   class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-3">
            <input type="password" id="password" placeholder="Password" required 
                   class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-3">
            
            <button type="submit" class="w-full py-3 bg-purple-600 rounded-2xl font-semibold">Sign In</button>
        </form>
        
        <p class="text-center mt-6 text-sm">
            <a href="signup.html" class="text-purple-400">Create new account</a>
        </p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzer7oCcXJVNUroa_TYHEnJx4KxTFnX4mGmrpf7y-WVH8DbQ-b1QyGkDIs_wTaQtxCs/exec";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", email, password })
            });
            const data = await res.json();
            
            if (data.success) {
                localStorage.setItem('sessionId', data.data.sessionId);
                window.location.href = "dashboard.html";
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
