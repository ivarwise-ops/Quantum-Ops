<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Ops Elite | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glow { box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
    .input-glow:focus { box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.4); }
  </style>
</head>
<body class="bg-[#05070a] min-h-screen flex items-center justify-center p-4 text-white">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-black font-bold text-xl">
          Q
        </div>
        <div class="text-left">
          <h1 class="text-2xl font-bold tracking-tight">QUANTUM OPS</h1>
          <p class="text-xs text-emerald-400 tracking-widest">ELITE • COMMAND CENTER</p>
        </div>
      </div>
      <p class="text-gray-400 text-sm">Your Business. One Command Center.</p>
    </div>

    <!-- Card -->
    <div class="bg-[#0c1017] border border-[#1a2332] rounded-2xl p-8 glow">
      <h2 class="text-xl font-semibold mb-1">Welcome Back</h2>
      <p class="text-gray-400 text-sm mb-7">Sign in to your command center</p>

      <!-- Error Message -->
      <div id="errorBox" class="hidden mb-5 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Email Address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="email" id="email" required
              class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 pl-11 pr-4 text-sm outline-none input-glow transition"
              placeholder="you@company.com" />
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="password" id="password" required
              class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 pl-11 pr-4 text-sm outline-none input-glow transition"
              placeholder="••••••••" />
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="rounded border-gray-600 bg-[#080b10]" />
            <span class="text-gray-400">Remember me</span>
          </label>
          <a href="#" class="text-emerald-400 hover:text-emerald-300">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn"
          class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-black font-semibold py-3.5 rounded-xl transition flex items-center justify-center gap-2">
          <span id="btnText">Sign In</span>
          <i id="btnSpinner" class="fa-solid fa-spinner fa-spin hidden"></i>
        </button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-7">
        Don't have an account?
        <a href="signup.html" class="text-emerald-400 hover:text-emerald-300 font-medium">Create one</a>
      </p>
    </div>

    <p class="text-center text-xs text-gray-600 mt-8">© 2026 Quantum Ops Elite • Secured by AI</p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzd1ZdCxxMt-CNEUOqqr5_ovGs-og1_kwey1ktocdmVZOJx3hjls5LVTlSu2mUG-MMN/exec";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("btnSpinner");
      const errorBox = document.getElementById("errorBox");

      // UI loading state
      btn.disabled = true;
      btnText.textContent = "Signing in...";
      spinner.classList.remove("hidden");
      errorBox.classList.add("hidden");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "login",
            email: email,
            password: password
          })
        });

        const data = await res.json();

        if (data.success) {
          // Store session
          localStorage.setItem("qo_token", data.token);
          localStorage.setItem("qo_user", JSON.stringify(data.user || {}));
          localStorage.setItem("qo_companyId", data.companyId || data.user?.companyId || "");

          // Redirect to dashboard
          window.location.href = "quantum-ops-elite-dashboard.html";
        } else {
          errorBox.textContent = data.message || "Invalid email or password";
          errorBox.classList.remove("hidden");
        }
      } catch (err) {
        errorBox.textContent = "Connection error. Please try again.";
        errorBox.classList.remove("hidden");
        console.error(err);
      } finally {
        btn.disabled = false;
        btnText.textContent = "Sign In";
        spinner.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
