<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum OPS Elite - Account Registration</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #080d1a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .neon-glow:focus {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg glass-panel rounded-2xl p-8 relative overflow-hidden">
        
        <!-- Header / Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-blue-600/20 border border-blue-500/40 text-blue-400 mb-3 neon-glow">
                <i class="fa-solid fa-crown text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white">QUANTUM OPS <span class="text-blue-500">ELITE</span></h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Create Enterprise Business Workspace</p>
        </div>

        <!-- Alert Message Container -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-lg text-sm font-medium transition-all"></div>

        <!-- Signup Form -->
        <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-5">
            
            <!-- Full Name -->
            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Full Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="fullName" required placeholder="Commander John Doe" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <!-- Email Address -->
            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Work Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required placeholder="commander@enterprise.com" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <!-- Company Name & Currency -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Company Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa-solid fa-building"></i>
                        </span>
                        <input type="text" id="companyName" required placeholder="AeroCorp Industries" 
                            class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm neon-glow transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Currency</label>
                    <select id="currency" class="w-full px-3 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white text-sm neon-glow transition-all">
                        <option value="USD">USD ($)</option>
                        <option value="NGN">NGN (₦)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                    </select>
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••••••" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/80 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" 
                class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-lg shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus"></i>
                <span>INITIALIZE WORKSPACE</span>
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-6 text-center text-xs text-gray-400">
            Already registered? 
            <a href="login.html" class="text-blue-400 hover:text-blue-300 font-semibold underline ml-1">Access Account</a>
        </div>
    </div>

    <!-- JavaScript Handler -->
    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzy5OVPf1zk4Quy_RvrictzgLVWFZ77E4VL1PnR7gcPexkffVCNoxsun0zceBMRBAxm/exec";

        async function handleSignup(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById("submitBtn");
            const alertBox = document.getElementById("alert-box");

            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> CREATING WORKSPACE...`;
            alertBox.classList.add("hidden");

            const payload = {
                action: "signup",
                payload: {
                    fullName: document.getElementById("fullName").value.trim(),
                    email: document.getElementById("email").value.trim(),
                    companyName: document.getElementById("companyName").value.trim(),
                    currency: document.getElementById("currency").value,
                    password: document.getElementById("password").value
                }
            };

            try {
                // Apps Script requires POST requests via no-cors or standard text fetch
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    showAlert("Account and Workspace initialized successfully! Redirecting to login...", "success");
                    
                    // Store local session fallback
                    localStorage.setItem("quantum_user", JSON.stringify(result.data));

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    showAlert(result.message || "Signup failed. Please try again.", "error");
                }

            } catch (err) {
                showAlert("Connection error to Google Apps Script. Please try again.", "error");
                console.error("Signup error:", err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-user-plus"></i> <span>INITIALIZE WORKSPACE</span>`;
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById("alert-box");
            alertBox.classList.remove("hidden", "bg-red-500/20", "border-red-500", "text-red-300", "bg-green-500/20", "border-green-500", "text-green-300");

            if (type === "success") {
                alertBox.classList.add("bg-green-500/20", "border", "border-green-500", "text-green-300");
            } else {
                alertBox.classList.add("bg-red-500/20", "border", "border-red-500", "text-red-300");
            }
            alertBox.innerText = message;
        }
    </script>
</body>
</html>
