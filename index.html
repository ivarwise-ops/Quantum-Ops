<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Ops Elite | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 flex items-center justify-center">
                    <i class="fa-solid fa-infinity text-white text-4xl"></i>
                </div>
            </div>
            <h1 class="text-4xl font-bold tracking-tighter">QUANTUM OPS ELITE</h1>
            <p class="text-slate-400 mt-2">Your Business. One Command Center.</p>
        </div>

        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8">
            <h2 class="text-2xl font-semibold mb-6 text-center">Welcome Back</h2>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Email or Username</label>
                    <input type="text" id="loginEmail" required 
                           class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-3 text-white focus:border-purple-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <input type="password" id="loginPassword" required 
                           class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-3 text-white focus:border-purple-500 outline-none">
                </div>

                <button type="submit" 
                        class="w-full py-3.5 bg-purple-600 hover:bg-purple-500 transition-colors font-semibold rounded-2xl">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center text-sm">
                <a href="signup.html" class="text-purple-400 hover:text-purple-300">Don't have an account? Create one</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzer7oCcXJVNUroa_TYHEnJx4KxTFnX4mGmrpf7y-WVH8DbQ-b1QyGkDIs_wTaQtxCs/exec";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "login",
                    email: email,
                    password: password
                })
            });

            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('sessionId', result.data.sessionId);
                window.location.href = "dashboard.html";
            } else {
                alert(result.message || "Login failed");
            }
        });
    </script>
</body>
</html>
