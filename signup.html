<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Ops Elite | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-600 flex items-center justify-center">
                    <i class="fa-solid fa-infinity text-white text-4xl"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold">Create Your Account</h1>
        </div>

        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8">
            <form id="signupForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-slate-300">Full Name</label>
                        <input type="text" id="fullName" required class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-2.5 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-slate-300">Username</label>
                        <input type="text" id="username" required class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-2.5 mt-1">
                    </div>
                </div>
                
                <div>
                    <label class="text-sm text-slate-300">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-2.5 mt-1">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-slate-300">Phone</label>
                        <input type="tel" id="phone" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-2.5 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-slate-300">Country</label>
                        <input type="text" id="country" value="Nigeria" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-2.5 mt-1">
                    </div>
                </div>

                <div>
                    <label class="text-sm text-slate-300">Password</label>
                    <input type="password" id="password" required class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-2.5 mt-1">
                </div>

                <button type="submit" 
                        class="w-full mt-4 py-3.5 bg-purple-600 hover:bg-purple-500 font-semibold rounded-2xl">
                    Create Account
                </button>
            </form>

            <p class="text-center mt-6 text-sm">
                Already have an account? <a href="index.html" class="text-purple-400">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzer7oCcXJVNUroa_TYHEnJx4KxTFnX4mGmrpf7y-WVH8DbQ-b1QyGkDIs_wTaQtxCs/exec";

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const data = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                country: document.getElementById('country').value,
                password: document.getElementById('password').value
            };

            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "signup", ...data })
            });

            const result = await response.json();
            alert(result.message || "Account created! Please check your email for verification.");
            
            if (result.success) {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
