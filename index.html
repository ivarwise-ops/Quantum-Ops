<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum OPS Elite - Portal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #080d1a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.25);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
        }
        .neon-glow:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            border-color: #3b82f6;
        }
        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass-panel rounded-2xl p-8 relative overflow-hidden my-6">
        
        <!-- Header / Logo -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600/20 border border-blue-500/40 text-blue-400 mb-3 shadow-lg shadow-blue-500/10">
                <i class="fa-solid fa-crown text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white">QUANTUM OPS <span class="text-blue-500">ELITE</span></h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Enterprise Command Access</p>
        </div>

        <!-- Mode Toggle Tabs -->
        <div class="flex border-b border-slate-700/60 mb-6 text-sm font-semibold">
            <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-3 text-center transition-all tab-active">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>SIGN IN
            </button>
            <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-3 text-center transition-all text-gray-400 hover:text-gray-200">
                <i class="fa-solid fa-user-plus mr-2"></i>REGISTER WORKSPACE
            </button>
        </div>

        <!-- Alert Notification Box -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-lg text-sm font-medium transition-all"></div>

        <!-- ==================== 1. LOGIN FORM ==================== -->
        <form id="loginForm" onsubmit="handleAuth(event, 'login')" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Work Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="login-email" required placeholder="commander@enterprise.com" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="text-xs font-semibold text-gray-300 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs text-blue-400 hover:text-blue-300">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="login-password" required placeholder="••••••••••••" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <button type="submit" id="loginSubmitBtn" 
                class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-lg shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2 tracking-wider mt-2">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span>AUTHENTICATE</span>
            </button>
        </form>

        <!-- ==================== 2. SIGNUP FORM ==================== -->
        <form id="signupForm" onsubmit="handleAuth(event, 'signup')" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Full Name *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="signup-fullName" required placeholder="Commander Alex Mercer" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Work Email *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="signup-email" required placeholder="alex@enterprise.com" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Phone Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa-solid fa-phone"></i>
                        </span>
                        <input type="tel" id="signup-phone" placeholder="+1 (555) 000-0000" 
                            class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Country</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa-solid fa-globe"></i>
                        </span>
                        <input type="text" id="signup-country" placeholder="United States / Nigeria" 
                            class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Company Name *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fa-solid fa-building"></i>
                        </span>
                        <input type="text" id="signup-companyName" required placeholder="AeroCorp Global" 
                            class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Currency</label>
                    <select id="signup-currency" class="w-full px-3 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white text-sm transition-all">
                        <option value="USD">USD ($)</option>
                        <option value="NGN">NGN (₦)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-1.5">Password *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="signup-password" required placeholder="••••••••••••" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900/90 border border-slate-700 rounded-lg focus:outline-none text-white placeholder-gray-500 text-sm neon-glow transition-all">
                </div>
            </div>

            <button type="submit" id="signupSubmitBtn" 
                class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-lg shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2 tracking-wider mt-2">
                <i class="fa-solid fa-user-plus"></i>
                <span>INITIALIZE WORKSPACE</span>
            </button>
        </form>

    </div>

    <!-- Script Operations -->
    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyikHnEW_huLrSDOjL_EBczDc-yvX8z6L4i2jb169A2-wiQhPjTIdn9C-kq_yjuy94z/exec";

        // Tab Switching Logic
        function switchTab(mode) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const alertBox = document.getElementById('alert-box');

            alertBox.classList.add('hidden');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                tabLogin.classList.add('tab-active');
                tabLogin.classList.remove('text-gray-400');
                tabSignup.classList.remove('tab-active');
                tabSignup.classList.add('text-gray-400');
            } else {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                tabSignup.classList.add('tab-active');
                tabSignup.classList.remove('text-gray-400');
                tabLogin.classList.remove('tab-active');
                tabLogin.classList.add('text-gray-400');
            }
        }

        // Authentication & Registration Handler
        async function handleAuth(event, type) {
            event.preventDefault();

            const alertBox = document.getElementById('alert-box');
            alertBox.classList.add('hidden');

            let payloadData = {};
            let btn = null;
            let loadingText = "";

            if (type === 'login') {
                btn = document.getElementById('loginSubmitBtn');
                loadingText = `<i class="fa-solid fa-spinner fa-spin"></i> AUTHENTICATING...`;
                payloadData = {
                    action: "login",
                    payload: {
                        email: document.getElementById('login-email').value.trim(),
                        password: document.getElementById('login-password').value,
                        device: navigator.userAgent
                    }
                };
            } else {
                btn = document.getElementById('signupSubmitBtn');
                loadingText = `<i class="fa-solid fa-spinner fa-spin"></i> INITIALIZING WORKSPACE...`;
                payloadData = {
                    action: "signup",
                    payload: {
                        fullName: document.getElementById('signup-fullName').value.trim(),
                        email: document.getElementById('signup-email').value.trim(),
                        phoneNumber: document.getElementById('signup-phone').value.trim(),
                        country: document.getElementById('signup-country').value.trim(),
                        companyName: document.getElementById('signup-companyName').value.trim(),
                        currency: document.getElementById('signup-currency').value,
                        password: document.getElementById('signup-password').value
                    }
                };
            }

            btn.disabled = true;
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = loadingText;

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payloadData)
                });

                const result = await response.json();

                if (result.status === "success") {
                    if (type === 'signup') {
                        showAlert("Workspace initialized! Please sign in with your credentials.", "success");
                        setTimeout(() => switchTab('login'), 1800);
                    } else {
                        showAlert("Authentication successful! Loading dashboard...", "success");
                        localStorage.setItem("quantum_token", result.data.token);
                        localStorage.setItem("quantum_company_id", result.data.companyId);
                        localStorage.setItem("quantum_user", JSON.stringify(result.data));

                        setTimeout(() => {
                            window.location.href = "quantum-ops-elite-dashboard.html";
                        }, 1200);
                    }
                } else {
                    showAlert(result.message || "Operation failed. Please try again.", "error");
                }
            } catch (err) {
                showAlert("Connection error to Apps Script backend. Check your deployment settings.", "error");
                console.error("Auth Error:", err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById("alert-box");
            alertBox.classList.remove("hidden", "bg-red-500/20", "border-red-500", "text-red-300", "bg-green-500/20", "border-green-500", "text-green-300");

            if (type === "success") {
                alertBox.classList.add("bg-green-500/20", "border", "border-green-500", "text-green-300");
            } else {
                alertBox.classList.add("bg-red-500/20", "border", "border-red-500", "text-red-300");
            }
            alertBox.innerText = message;
        }
    </script>
</body>
</html>
