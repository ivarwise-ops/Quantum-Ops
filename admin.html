<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Quantum Ops Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <h1 class="text-3xl font-bold mb-8">Admin Panel</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
            <h3 class="font-semibold mb-4">User Statistics</h3>
            <button onclick="loadStats()" class="px-4 py-2 bg-purple-600 rounded-2xl">Load Stats</button>
            <div id="stats" class="mt-4 text-sm"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzer7oCcXJVNUroa_TYHEnJx4KxTFnX4mGmrpf7y-WVH8DbQ-b1QyGkDIs_wTaQtxCs/exec";
        
        async function loadStats() {
            const sessionId = localStorage.getItem('sessionId');
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getUserStatistics", sessionId })
            });
            const data = await res.json();
            document.getElementById('stats').innerHTML = JSON.stringify(data.data, null, 2);
        }
    </script>
</body>
</html>
