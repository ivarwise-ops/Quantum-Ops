<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum OPS Elite - Create Account</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      background-color: #0b0f19;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .auth-card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(56, 189, 248, 0.2);
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.15);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(10px);
    }
    .auth-card h2 {
      margin-top: 0;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }
    .form-group input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }
    .btn-submit {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.6);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .auth-footer a {
      color: #38bdf8;
      text-decoration: none;
    }
    .status-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <h2>Quantum OPS</h2>
  <p style="text-align:center; color:#64748b; font-size:0.9rem; margin-bottom:1.5rem;">Create Your Tenant Account</p>
  
  <form id="signupForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" required placeholder="e.g. John Doe">
    </div>
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="companyName" required placeholder="e.g. Apex Enterprises">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="name@company.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+1234567890">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Register Company</button>
  </form>

  <div id="statusMsg" class="status-msg"></div>

  <div class="auth-footer">
    Already registered? <a href="login.html">Sign In</a>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('statusMsg');
    
    btn.disabled = true;
    btn.innerText = "Provisioning Account...";
    msg.style.color = "#38bdf8";
    msg.innerText = "Connecting to Quantum OPS Engine...";

    const payload = {
      fullName: document.getElementById('fullName').value,
      companyName: document.getElementById('companyName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      passwordHash: document.getElementById('password').value // Note: In production, hash on frontend/backend
    };

    const res = await apiCall("REGISTER_USER", payload);

    if (res.success) {
      msg.style.color = "#22c55e";
      msg.innerText = "Account Created! Redirecting to dashboard...";
      
      // Save session info
      setSession({
        userId: res.data.userId,
        companyId: res.data.companyId,
        fullName: res.data.fullName,
        email: res.data.email
      });

      setTimeout(() => {
        window.location.href = "quantum-ops-elite-dashboard.html";
      }, 1500);
    } else {
      msg.style.color = "#ef4444";
      msg.innerText = res.message || "Registration failed. Try again.";
      btn.disabled = false;
      btn.innerText = "Register Company";
    }
  });
</script>
</body>
</html>
