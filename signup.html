<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Ops Elite | Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glow { box-shadow: 0 0 25px rgba(0, 255, 136, 0.12); }
    .input-glow:focus { box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.4); }
  </style>
</head>
<body class="bg-[#05070a] min-h-screen flex items-center justify-center p-4 text-white">

  <div class="w-full max-w-lg">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-3">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-black font-bold text-xl">
          Q
        </div>
        <div class="text-left">
          <h1 class="text-2xl font-bold tracking-tight">QUANTUM OPS</h1>
          <p class="text-xs text-emerald-400 tracking-widest">ELITE • COMMAND CENTER</p>
        </div>
      </div>
      <p class="text-gray-400 text-sm">Create your business command center</p>
    </div>

    <!-- Card -->
    <div class="bg-[#0c1017] border border-[#1a2332] rounded-2xl p-8 glow">
      <h2 class="text-xl font-semibold mb-1">Create Account</h2>
      <p class="text-gray-400 text-sm mb-6">Start managing your empire in minutes</p>

      <div id="errorBox" class="hidden mb-5 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>
      <div id="successBox" class="hidden mb-5 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm"></div>

      <form id="signupForm" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">Full Name</label>
            <input type="text" id="fullName" required
              class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow"
              placeholder="David John" />
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">Phone</label>
            <input type="tel" id="phone"
              class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow"
              placeholder="+234 800 000 0000" />
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Email Address</label>
          <input type="email" id="email" required
            class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow"
            placeholder="you@company.com" />
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Company / Business Name</label>
          <input type="text" id="companyName" required
            class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow"
            placeholder="My Awesome Company Ltd" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">Country</label>
            <select id="country" class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow">
              <option value="NG">Nigeria</option>
              <option value="US">United States</option>
              <option value="GB">United Kingdom</option>
              <option value="GH">Ghana</option>
              <option value="KE">Kenya</option>
              <option value="ZA">South Africa</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">Default Currency</label>
            <select id="currency" class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow">
              <option value="NGN">NGN (₦)</option>
              <option value="USD">USD ($)</option>
              <option value="GBP">GBP (£)</option>
              <option value="EUR">EUR (€)</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Password</label>
          <input type="password" id="password" required minlength="6"
            class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow"
            placeholder="Minimum 6 characters" />
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Confirm Password</label>
          <input type="password" id="confirmPassword" required
            class="w-full bg-[#080b10] border border-[#1e2a3a] rounded-xl py-3 px-4 text-sm outline-none input-glow"
            placeholder="Repeat password" />
        </div>

        <button type="submit" id="signupBtn"
          class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-black font-semibold py-3.5 rounded-xl transition flex items-center justify-center gap-2 mt-2">
          <span id="btnText">Create Account</span>
          <i id="btnSpinner" class="fa-solid fa-spinner fa-spin hidden"></i>
        </button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="login.html" class="text-emerald-400 hover:text-emerald-300 font-medium">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzd1ZdCxxMt-CNEUOqqr5_ovGs-og1_kwey1ktocdmVZOJx3hjls5LVTlSu2mUG-MMN/exec";

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const companyName = document.getElementById("companyName").value.trim();
      const country = document.getElementById("country").value;
      const currency = document.getElementById("currency").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");
      const btn = document.getElementById("signupBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("btnSpinner");

      errorBox.classList.add("hidden");
      successBox.classList.add("hidden");

      if (password !== confirmPassword) {
        errorBox.textContent = "Passwords do not match";
        errorBox.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btnText.textContent = "Creating account...";
      spinner.classList.remove("hidden");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "signup",
            fullName,
            email,
            phone,
            companyName,
            country,
            currency,
            password
          })
        });

        const data = await res.json();

        if (data.success) {
          successBox.textContent = "Account created successfully! Redirecting to login...";
          successBox.classList.remove("hidden");

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1800);
        } else {
          errorBox.textContent = data.message || "Signup failed. Please try again.";
          errorBox.classList.remove("hidden");
        }
      } catch (err) {
        errorBox.textContent = "Connection error. Please try again.";
        errorBox.classList.remove("hidden");
        console.error(err);
      } finally {
        btn.disabled = false;
        btnText.textContent = "Create Account";
        spinner.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
