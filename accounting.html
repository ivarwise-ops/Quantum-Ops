<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting | Quantum Ops Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <h1 class="text-3xl font-bold mb-8">Accounting</h1>
    
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
        <button onclick="loadAccounting()" class="px-4 py-2 bg-purple-600 rounded-2xl">Load Accounting Summary</button>
        <div id="accountingData" class="mt-4"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzer7oCcXJVNUroa_TYHEnJx4KxTFnX4mGmrpf7y-WVH8DbQ-b1QyGkDIs_wTaQtxCs/exec";
        
        async function loadAccounting() {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getAccountingSummary" })
            });
            const data = await res.json();
            document.getElementById('accountingData').innerHTML = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
